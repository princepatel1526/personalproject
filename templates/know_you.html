<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>How Well I Know You</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
</head>
<body>
<main class="questions-wrapper">
  <section class="form-card know-form reveal">
    <h2>How well do I know you?</h2>
    <p id="knowProgress" class="progress-text">Card 1 of 7</p>

    <div id="flipCard" class="flip-card" role="button" tabindex="0" aria-label="Tap to flip card">
      <div class="flip-inner" id="flipInner">
        <article class="flip-face flip-front">
          <div class="card-image-container">
            <img id="cardImage" src="{{ url_for('static', filename='images/mansi1.jpg') }}" alt="Mansi" loading="lazy" class="know-image">
          </div>
          <div class="card-content know-copy">
            <h3 id="cardTitle"></h3>
          </div>
        </article>
        <article class="flip-face flip-back">
          <div class="card-content know-copy back-copy">
            <h3 id="cardBackTitle"></h3>
            <p id="cardDescription" class="card-description"></p>
          </div>
        </article>
      </div>
    </div>

    <div class="btn-row know-nav-row">
      <button type="button" id="prevCardBtn" class="secondary-btn" disabled>Previous</button>
      <button type="button" id="nextCardBtn" class="primary-btn">Next</button>
      <a id="proceedBtn" href="{{ url_for('questions') }}" class="primary-btn hidden">Proceed to Questions</a>
    </div>
  </section>
</main>

<script>
  window.knowYouCards = [
    { image: 'mansi1.jpg', title: 'Your name… Mansi Shukla… is not just a name to me.', description: 'It’s something that instantly grabs my attention, no matter what I’m doing.' },
    { image: 'mansi2.jpg', title: 'Your roots are beautifully spread.', description: 'Madhya Pradesh from your mother’s side, Uttar Pradesh from your father’s… a mix that makes you uniquely you.' },
    { image: 'mansi3.jpg', title: 'We share more than just conversations.', description: 'We even come from the same school… maybe that’s why it feels so familiar talking to you.' },
    { image: 'mansi4.jpg', title: 'You don’t chase loudness.', description: 'You like gray—simple, calm, and quietly beautiful… just like your personality at times.' },
    { image: 'mansi5.jpg', title: 'You notice beauty in soft things.', description: 'Like lilies… not flashy, but elegant and meaningful.' },
    { image: 'mansi6.jpg', title: 'Your music taste says a lot about you.', description: 'Arijit Singh… which means you understand emotions more deeply than you show.' },
    { image: 'mansi7.jpg', title: 'And then there’s your comfort world…', description: 'Music, books, and those long naps—you know how to slow down in a fast world.' }
  ];
</script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
