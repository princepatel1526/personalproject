<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Love Story Questions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
</head>
<body>
  <main class="questions-wrapper">
    <form id="proposalForm" class="form-card" method="POST" action="{{ url_for('submit') }}" novalidate>
      <h2>Before the final question...</h2>
      <p id="progressText" class="progress-text"></p>
      <div class="progress-wrap"><div id="progressBar" class="progress-bar"></div></div>
      <img src="{{ url_for('static', filename='images/rose-glow.svg') }}" alt="romantic glow" class="form-accent" loading="lazy" />
      {% for question in questions %}
      <section class="form-step {% if loop.first %}active{% endif %}">
        <h3>{{ loop.index }}. {{ question.text }}</h3>
        <div class="option-grid">
          {% for option in question.options %}
          <label class="option-card" for="{{ question.id }}_{{ loop.index }}">
            <input id="{{ question.id }}_{{ loop.index }}" type="radio" name="{{ question.id }}" value="{{ option.text }}" data-tone="{{ option.tone }}" required>
            <span>{{ option.text }}</span>
          </label>
          {% endfor %}
        </div>
        <small class="error">Please choose one option to continue.</small>
      </section>
      {% endfor %}
      <div class="btn-row">
        <button type="button" id="prevBtn" class="secondary-btn" disabled>Previous</button>
        <button type="button" id="nextBtn" class="primary-btn">Next</button>
        <button type="submit" id="submitBtn" class="primary-btn hidden">Submit</button>
      </div>
    </form>
  </main>
  <div id="emojiBurst" class="emoji-burst" aria-hidden="true"></div>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
